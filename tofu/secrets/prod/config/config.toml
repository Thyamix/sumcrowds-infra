# Sumcrowds Production Configuration

[server]
port = 8080
host = "https://app.sumcrowds.com"

[endpoints]
api_base = "https://app.sumcrowds.com/api/"
ws_base = "wss://app.sumcrowds.com/ws/"

[cors]
# Multiple origins allowed for production
allowed_origins = [
    "https://app.sumcrowds.com"
]

[frontend]
port = 3000
