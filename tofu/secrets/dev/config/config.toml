# Sumcrowds Development Configuration

[server]
port = 8080
host = "https://sumcrowdsapi.thyamix.com"

[endpoints]
api_base = "https://sumcrowdsapi.thyamix.com/api/"
ws_base = "wss://sumcrowdsapi.thyamix.com/ws/"

[cors]
# Multiple origins allowed for development
allowed_origins = [
    "http://192.168.1.75:31490",
    "http://localhost:3000",
    "https://sumcrowds.thyamix.com"
]

[frontend]
port = 3000
